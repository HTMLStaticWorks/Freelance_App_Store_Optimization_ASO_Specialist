<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ASO Elite Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0c29;
            overflow: hidden;
        }
        .login-container {
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
        }
        .login-visual {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-1.2.1&auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: white;
            text-align: center;
        }
        .login-form-side {
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }
        .form-box {
            width: 100%;
            max-width: 450px;
        }
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border-radius: var(--radius-md);
            border: 1px solid #ddd;
            background: var(--secondary-bg); transition: var(--transition);
        }
        .floating-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--peach-gradient);
            filter: blur(100px);
            opacity: 0.2;
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="floating-bg" style="top: -100px; right: -100px;"></div>
    <div class="floating-bg" style="bottom: -100px; left: -100px;"></div>

    <div class="login-container">
        <div class="login-visual">
            <div>
                <h1 style="font-size: 3.5rem; margin-bottom: 20px;">Welcome Back</h1>
                <p style="font-size: 1.2rem; opacity: 0.8;">Access your app's growth metrics and manage your ASO campaigns in one place.</p>
            </div>
        </div>
        <div class="login-form-side">
            <div class="form-box">
                <a href="index.html" class="logo flex" style="align-items: center; gap: 10px; -webkit-text-fill-color: initial; background: none; margin-bottom: 40px;">
                    <img src="assets/images/logo.png" alt="ASO Elite Logo" style="height: 40px; border-radius: 8px;">
                    <span style="background: var(--peach-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ASO ELITE</span>
                </a>
                <h2 style="margin-bottom: 10px;">Login</h2>
                <p style="opacity: 0.6; margin-bottom: 40px;">Don't have an account? <a href="register.html" style="color: var(--primary-purple); font-weight: bold;">Sign Up</a></p>
                
                <div class="social-login">
                    <button class="btn btn-outline" style="font-size: 0.9rem;">Google</button>
                    <button class="btn btn-outline" style="font-size: 0.9rem;">Apple ID</button>
                </div>

                <div class="divider" style="text-align: center; margin-bottom: 30px; position: relative;">
                    <span style="background: var(--bg-color); padding: 0 15px; position: relative; z-index: 1;">OR</span>
                    <hr style="position: absolute; top: 50%; width: 100%; border: 0; border-top: 1px solid #ddd;">
                </div>

                <form action="index.html">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="name@company.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <div class="flex" style="justify-content: space-between; margin-bottom: 30px; font-size: 0.9rem;">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#" style="color: var(--primary-purple);">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 18px;">Login to Portal</button>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
